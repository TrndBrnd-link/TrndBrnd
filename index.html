<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeStream | Cinematic Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- 1. CORE & RESET --- */
        :root { 
            --primary: #fe2c55; 
            --whatsapp: #25D366;
            --facebook: #1877F2;
            --tiktok: #000000;
            --bg: #000; 
            --glass-bg: rgba(30, 30, 34, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); color: #fff; 
            height: 100dvh; overflow: hidden; 
            position: relative;
        }

        /* --- 2. CINEMATIC FEED --- */
        #feedContainer { 
            height: 100%;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory;
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
            position: relative; 
            z-index: 1;
        }
        #feedContainer::-webkit-scrollbar { display: none; }

        .card { 
            width: 100%; height: 100%; 
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; 
            display: flex; align-items: center; justify-content: center;
            background: #09090b; 
            overflow: hidden;
        }

        .media { 
            width: 100%; height: 100%; 
            object-fit: cover; position: absolute; inset: 0;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            animation: fadeInMedia 0.8s ease forwards;
        }

        @keyframes fadeInMedia { to { opacity: 1; } }

        /* Actions overlay */
        .card-info {
            position: absolute;
            bottom: 120px; 
            left: 20px;
            right: 90px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .card-info h3 { font-size: 1.2rem; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px; }
        .card-info p { font-size: 0.9rem; color: rgba(255,255,255,0.8); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .actions {
            position: absolute; 
            bottom: 120px; right: 15px;
            display: flex; flex-direction: column; gap: 16px; 
            z-index: 10;
        }

        .action-btn {
            width: 52px; height: 52px; 
            border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .action-btn:active { transform: scale(0.9); }
        
        .btn-wa { background: rgba(37, 211, 102, 0.25); color: #25D366; border-color: rgba(37, 211, 102, 0.4); }
        .btn-wa:hover { background: var(--whatsapp); color: #fff; }
        
        .btn-fb { background: rgba(24, 119, 242, 0.25); color: #1877F2; border-color: rgba(24, 119, 242, 0.4); }
        .btn-fb:hover { background: var(--facebook); color: #fff; }
        
        .btn-tt { background: rgba(0, 0, 0, 0.6); color: #ffffff; border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3); }
        .btn-tt:hover { background: var(--tiktok); color: #fff; border-color: var(--primary); }

        /* Loader & Scroll Indicator */
        .scroll-trigger { height: 10px; width: 100%; position: absolute; bottom: 0; }

        /* --- 3. GEMINI-STYLE SEARCH ISLAND --- */
        #searchIsland {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 10px 0 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            z-index: 50;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #searchIsland:focus-within {
            background: rgba(40, 40, 45, 0.8);
            border-color: var(--glass-glow);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 255, 255, 0.05);
            transform: translateX(-50%) translateY(-2px);
        }

        .search-icon { color: rgba(255, 255, 255, 0.5); font-size: 18px; transition: color 0.3s; }
        #searchIsland:focus-within .search-icon { color: #fff; }

        #searchInput {
            flex: 1; height: 100%;
            background: transparent; border: none;
            padding: 0 15px; color: white;
            font-size: 16px; outline: none;
        }

        #searchInput::placeholder { color: rgba(255, 255, 255, 0.4); }

        .search-action-btn {
            width: 40px; height: 40px;
            border-radius: 50%; border: none;
            background: rgba(255,255,255,0.05);
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            opacity: 0; pointer-events: none;
            transform: scale(0.8);
        }

        .search-action-btn.active {
            opacity: 1; pointer-events: all; transform: scale(1);
        }

        .island-loader {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="feedContainer"></div>

    <div id="searchIsland">
        <i class="fa-solid fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search universe descriptions..." autocomplete="off">
        <div class="island-loader" id="searchLoader"></div>
        <button class="search-action-btn" id="clearSearchBtn">
            <i class="fa-solid fa-times"></i>
        </button>
    </div>

    <script>
        /**
         * 1. GLOBAL INFRASTRUCTURE CONFIGURATION
         * Replace placeholder values with your specific GitHub Username, Repository Name, 
         * Branch, and Folder Path details to map assets natively.
         */
        const GITHUB_CONFIG = {
            username: "TrndBrnd-link",
            repository: "TrndBrnd",
            branch: "main",
            folderPath: "assets" // Use "" if images are housed directly at the root level
        };

        // Computes explicit raw content base delivery path
        const GITHUB_BASE_URL = `https://raw.githubusercontent.com/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repository}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.folderPath ? GITHUB_CONFIG.folderPath + '/' : ''}`;

        /**
         * 2. CENTRALIZED DATABASE SYSTEM WITH COMPREHENSIVE SCHEMAS
         * Houses descriptive parameters along with manual routing URLs per record object.
         */
        class AssetDatabase {
            static async getRecords() {
                // Mimicking async latency common to external platform delivery layers
                await new Promise(resolve => setTimeout(resolve, 200));

                return [
                    { 
                        id: 'img1', 
                        file: '2.jpg', 
                        name: 'Mountain Sunset', 
                        desc: 'A breathtaking view of rocky mountains during golden hour. The sky transitions from deep orange to purple, casting long shadows across the valley below.',
                        links: {
                            whatsapp: 'https://wa.me/9647800000001?text=Inquiry%20Mountain%20Sunset',
                            facebook: 'https://facebook.com/yourpage/posts/mountain-sunset-id',
                            tiktok: 'https://tiktok.com/@yourprofile/video/mountain-sunset-id'
                        }
                    },
                    { 
                        id: 'img2', 
                        file: '3.jpg', 
                        name: 'Ocean Horizon', 
                        desc: 'Crystal clear blue waters crashing against white sand beaches. The tropical ocean view provides a calming, serene atmosphere perfect for summer vibes.',
                        links: {
                            whatsapp: 'https://wa.me/9647800000002?text=Inquiry%20Ocean%20Horizon',
                            facebook: 'https://facebook.com/yourpage/posts/ocean-horizon-id',
                            tiktok: 'https://tiktok.com/@yourprofile/video/ocean-horizon-id'
                        }
                    },
                    { 
                        id: 'img3', 
                        file: '4.jpg', 
                        name: 'Cyberpunk City', 
                        desc: 'Urban nightlife captured in a neon-lit metropolis. Towering skyscrapers, flying vehicles, and glowing street signs create a moody, futuristic atmosphere.',
                        links: {
                            whatsapp: 'https://wa.me/9647800000003?text=Inquiry%20Cyberpunk%20City',
                            facebook: 'https://facebook.com/yourpage/posts/cyberpunk-city-id',
                            tiktok: 'https://tiktok.com/@yourprofile/video/cyberpunk-city-id'
                        }
                    },
                    { 
                        id: 'img4', 
                        file: '5.jpg', 
                        name: 'Emerald Forest', 
                        desc: 'Deep within an ancient woodland, sunlight pierces through the thick canopy of green leaves. Mist hovers cleanly above the damp, mossy ground.',
                        links: {
                            whatsapp: 'https://wa.me/9647800000004?text=Inquiry%20Emerald%20Forest',
                            facebook: 'https://facebook.com/yourpage/posts/emerald-forest-id',
                            tiktok: 'https://tiktok.com/@yourprofile/video/emerald-forest-id'
                        }
                    },
                    { 
                        id: 'img5', 
                        file: '6.jpg', 
                        name: 'Sahara Dunes', 
                        desc: 'Endless rolling sand dunes under a blazing sun. The warm, arid landscape features sharp ridges sculpted by shifting desert winds.',
                        links: {
                            whatsapp: 'https://wa.me/9647800000005?text=Inquiry%20Sahara%20Dunes',
                            facebook: 'https://facebook.com/yourpage/posts/sahara-dunes-id',
                            tiktok: 'https://tiktok.com/@yourprofile/video/sahara-dunes-id'
                        }
                    },
                    { 
                        id: 'img6', 
                        file: '7.jpg', 
                        name: 'Arctic Peak', 
                        desc: 'A frozen tundra featuring massive glaciers and snow-capped mountains. The cold, crisp air and blue ice create a beautiful winter wonderland.',
                        links: {
                            whatsapp: 'https://wa.me/9647800000006?text=Inquiry%20Arctic%20Peak',
                            facebook: 'https://facebook.com/yourpage/posts/arctic-peak-id',
                            tiktok: 'https://tiktok.com/@yourprofile/video/arctic-peak-id'
                        }
                    }
                ];
            }
        }

        /**
         * 3. APPLICATION ENGINE STATE ENGINE
         */
        let MasterDatabase = [];
        let RuntimePool = [];
        let IsSearching = false;

        const feedContainer = document.getElementById('feedContainer');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchLoader = document.getElementById('searchLoader');

        /**
         * Fisher-Yates Randomization Algorithm Utility
         */
        function randomizeArray(array) {
            const copy = [...array];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        /**
         * Core Bootstrap Initialization
         */
        async function bootstrap() {
            MasterDatabase = await AssetDatabase.getRecords();
            // Enforce default baseline randomization on initial loading state
            RuntimePool = randomizeArray(MasterDatabase);
            renderFeed(RuntimePool);
            setupScrollObserver();
        }

        /**
         * 4. RENDER LAYOUT MANAGEMENT
         */
        function renderFeed(items, appendMode = false) {
            if (!appendMode) feedContainer.innerHTML = '';
            
            if (items.length === 0) {
                feedContainer.innerHTML = `
                    <div class="card" style="flex-direction: column; gap: 10px;">
                        <i class="fa-solid fa-cloud-bounce" style="font-size: 2.5rem; color: rgba(255,255,255,0.15);"></i>
                        <p style="color: rgba(255,255,255,0.4); font-size: 0.95rem;">No platform transmissions matched your request.</p>
                    </div>`;
                return;
            }

            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Absolute structural pathing computed straight from CDN settings
                const resolvedMediaUrl = GITHUB_BASE_URL + item.file;
                
                card.innerHTML = `
                    <img class="media" src="${resolvedMediaUrl}" alt="${item.name}" onerror="this.onerror=null; handleImageFallback(this, '${item.name}');">
                    <div class="card-info">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div class="actions">
                        <button class="action-btn btn-wa" onclick="executeExternalRedirect('${item.links.whatsapp}')" title="Share via WhatsApp">
                            <i class="fa-brands fa-whatsapp"></i>
                        </button>
                        <button class="action-btn btn-fb" onclick="executeExternalRedirect('${item.links.facebook}')" title="View on Facebook">
                            <i class="fa-brands fa-facebook-f"></i>
                        </button>
                        <button class="action-btn btn-tt" onclick="executeExternalRedirect('${item.links.tiktok}')" title="Watch on TikTok">
                            <i class="fa-brands fa-tiktok"></i>
                        </button>
                    </div>
                `;
                feedContainer.appendChild(card);
            });

            const trigger = document.createElement('div');
            trigger.className = 'scroll-trigger';
            feedContainer.appendChild(trigger);
        }

        /**
         * Graceful Fallback Management if GitHub configuration variables are left unassigned
         */
        function handleImageFallback(imgElement, label) {
            imgElement.src = `https://placehold.co/1080x1920/18181b/ffffff?text=${encodeURIComponent(label)}`;
        }

        function executeExternalRedirect(targetUrl) {
            if (targetUrl && targetUrl !== '#' && !targetUrl.includes('YOUR_')) {
                window.open(targetUrl, '_blank', 'noopener,noreferrer');
            } else {
                alert("Destination target URL configuration parameters require assignment within the internal database schema.");
            }
        }

        /**
         * Infinite Continuous Cycling Engine Logic
         */
        function setupScrollObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.remove();
                        appendContinuousLoop();
                    }
                });
            }, { root: feedContainer, threshold: 0.1 });

            const rebindTrigger = () => {
                const trigger = document.querySelector('.scroll-trigger');
                if (trigger) observer.observe(trigger);
            };

            const structuralMutation = new MutationObserver(rebindTrigger);
            structuralMutation.observe(feedContainer, { childList: true });
            rebindTrigger();
        }

        function appendContinuousLoop() {
            // Continually serve records randomly shuffled on iterative loop extensions
            const dynamicCycleSegment = randomizeArray(MasterDatabase).slice(0, 3);
            renderFeed(dynamicCycleSegment, true);
        }

        /**
         * 5. HIGH-WEIGHT TOKENIZED SEARCH ALGORITHM
         */
        let operationalSearchDebounce;
        searchInput.addEventListener('input', (e) => {
            const queryText = e.target.value.trim();
            
            clearSearchBtn.classList.toggle('active', queryText.length > 0);
            if(queryText.length === 0) searchLoader.style.display = 'none';

            clearTimeout(operationalSearchDebounce);
            operationalSearchDebounce = setTimeout(() => {
                processStructuralSearch(queryText);
            }, 350); 
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.classList.remove('active');
            processStructuralSearch('');
            searchInput.focus();
        });

        async function processStructuralSearch(queryText) {
            IsSearching = queryText.length > 0;
            
            if (!IsSearching) {
                renderFeed(RuntimePool);
                return;
            }

            searchLoader.style.display = 'block';
            clearSearchBtn.style.display = 'none';

            await new Promise(resolve => setTimeout(resolve, 250));

            const cleanQuery = queryText.toLowerCase();
            const tokenizedWords = cleanQuery.split(/\s+/).filter(word => word.length > 1);

            const searchMatches = MasterDatabase.map(record => {
                let positionalScore = 0;
                const nameStr = record.name.toLowerCase();
                const descStr = record.desc.toLowerCase();

                // Priority Layer 1: Strict Equality Matches
                if (nameStr === cleanQuery) positionalScore += 200;
                if (descStr.includes(cleanQuery)) positionalScore += 80;

                // Priority Layer 2: Phrase Index Tokenization Checks
                if (nameStr.includes(cleanQuery)) positionalScore += 60;

                // Priority Layer 3: Text Token Relevance Scans
                tokenizedWords.forEach(token => {
                    if (nameStr.includes(token)) positionalScore += 25;
                    if (descStr.includes(token)) positionalScore += 10;
                });

                return { ...record, searchRelevanceScore: positionalScore };
            })
            .filter(record => record.searchRelevanceScore > 0)
            .sort((alpha, beta) => beta.searchRelevanceScore - alpha.searchRelevanceScore);

            renderFeed(searchMatches);
            
            searchLoader.style.display = 'none';
            clearSearchBtn.style.display = 'flex';
        }

        window.onload = bootstrap;
    </script>
</body>
</html>
